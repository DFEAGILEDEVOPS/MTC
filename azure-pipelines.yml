        name: CapturePreprodStatus
        condition: always()
        displayName: 'Capture Preprod job status'

  - job: NotifyTeamsSummary
    displayName: 'Notify Teams - Pipeline Summary'
    dependsOn:
      - PlaywrightDev
      - PlaywrightTest
      - PlaywrightPreprod
    condition: always()
    variables:
      DEV_JOB_STATUS: $[ dependencies.PlaywrightDev.outputs['CaptureDevStatus.JOB_STATUS'] ]
      TEST_JOB_STATUS: $[ dependencies.PlaywrightTest.outputs['CaptureTestStatus.JOB_STATUS'] ]
      PREPROD_JOB_STATUS: $[ dependencies.PlaywrightPreprod.outputs['CapturePreprodStatus.JOB_STATUS'] ]
    steps:
      - task: UseNode@1
        inputs:
          version: '$(NODE_VERSION)'
        displayName: 'Install Node.js'

      - script: |
          node <<'EOF'
          const webhookUrl = process.env.TEAMS_WEBHOOK_URL;

          if (!webhookUrl) {
            console.warn('[TeamsSummary] TEAMS_WEBHOOK_URL not set. Skipping Teams notification.');
            process.exit(0);
          }

          const statuses = [
            { env: 'dev', status: process.env.DEV_JOB_STATUS || 'Unknown' },
            { env: 'test', status: process.env.TEST_JOB_STATUS || 'Unknown' },
            { env: 'preprod', status: process.env.PREPROD_JOB_STATUS || 'Unknown' },
          ];

          const isSuccess = (status) => status === 'Succeeded';
          const failedCount = statuses.filter((item) => !isSuccess(item.status)).length;
          const passedCount = statuses.length - failedCount;
          const overallPassed = failedCount === 0;

          const buildId = process.env.BUILD_BUILDID;
          const project = process.env.SYSTEM_TEAMPROJECT;
          const collectionUri = process.env.SYSTEM_COLLECTIONURI;
          const buildUrl = `${collectionUri}${project}/_build/results?buildId=${buildId}`;

          const statusRows = statuses.map((item) => ({
            type: 'ColumnSet',
            columns: [
              {
                width: 'stretch',
                items: [
                  {
                    type: 'TextBlock',
                    text: item.env,
                    weight: 'bolder',
                    size: 'small',
                  },
                ],
              },
              {
                width: 'stretch',
                items: [
                  {
                    type: 'TextBlock',
                    text: `${isSuccess(item.status) ? '✅ Passed' : '❌ Failed'} (${item.status})`,
                    color: isSuccess(item.status) ? 'good' : 'attention',
                    size: 'small',
                  },
                ],
              },
            ],
          }));

          const card = {
            type: 'AdaptiveCard',
            $schema: 'http://adaptivecards.io/schemas/adaptive-card.json',
            version: '1.4',
            body: [
              {
                type: 'TextBlock',
                text: overallPassed ? 'Playwright Pipeline Summary ✅ PASSED' : 'Playwright Pipeline Summary ❌ FAILED',
                weight: 'bolder',
                size: 'large',
                color: overallPassed ? 'good' : 'attention',
              },
              {
                type: 'TextBlock',
                text: `Passed environments: ${passedCount} | Failed environments: ${failedCount}`,
                wrap: true,
                spacing: 'small',
              },
              {
                type: 'Container',
                style: 'emphasis',
                items: statusRows,
              },
              {
                type: 'TextBlock',
                text: `Build: ${buildUrl}`,
                wrap: true,
                size: 'small',
                spacing: 'medium',
              },
            ],
          };

          async function run() {
            try {
              const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(card),
              });

              if (!response.ok) {
                console.error(`[TeamsSummary] Failed to send Teams summary: ${response.status} ${response.statusText}`);
                process.exit(0);
              }

              console.log('[TeamsSummary] Sent single pipeline summary notification.');
            } catch (error) {
              console.error('[TeamsSummary] Error sending Teams summary:', error);
              process.exit(0);
            }
          }

          run();
          EOF
        displayName: 'Send Teams pipeline summary card'
        env:
          TEAMS_WEBHOOK_URL: '$(TEAMS_WEBHOOK_URL)'
          DEV_JOB_STATUS: '$(DEV_JOB_STATUS)'
          TEST_JOB_STATUS: '$(TEST_JOB_STATUS)'
          PREPROD_JOB_STATUS: '$(PREPROD_JOB_STATUS)'
          BUILD_BUILDID: '$(Build.BuildId)'
          SYSTEM_TEAMPROJECT: '$(System.TeamProject)'
          SYSTEM_COLLECTIONURI: '$(System.CollectionUri)'
