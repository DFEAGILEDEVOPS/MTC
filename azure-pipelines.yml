trigger:
  - master
  - testing/automation-scripts

pr:
  - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: NODE_VERSION
    value: '20'
  - name: AUTH_JSON_SECRET
    value: '$(AUTH_JSON_CONTENT)'

jobs:
  - job: PlaywrightDev
    displayName: 'Playwright - Dev'
    variables:
      TEST_WORKDIR: 'test/pupil-hpa'
      E2E_SCRIPT: 'test:e2e:dev'
      ADMIN_BASE_URL: 'https://devadmin-as-mtc.azurewebsites.net'
      PUPIL_BASE_URL: 'https://devpupil-as-mtc.azurewebsites.net'
      PUPIL_API_BASE_URL: 'https://devauth-as-mtc.azurewebsites.net'
      JUNIT_PREFIX: 'dev'
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: '$(NODE_VERSION)'
        displayName: 'Install Node.js'

      - task: Cache@2
        inputs:
          key: 'npm | "$(Agent.OS)" | $(TEST_WORKDIR)/package-lock.json'
          restoreKeys: |
            npm | "$(Agent.OS)"
          path: $(HOME)/.npm
        displayName: 'Cache npm dependencies'

      - script: npm ci
        workingDirectory: '$(TEST_WORKDIR)'
        displayName: 'Install test dependencies'

      - script: npx playwright install --with-deps
        workingDirectory: '$(TEST_WORKDIR)'
        displayName: 'Install Playwright browsers'

      - script: |
          if printf '%s' '$(AUTH_JSON_SECRET)' | base64 --decode > '$(Build.SourcesDirectory)/auth.json' 2>/dev/null; then
            echo 'Restored base64-encoded auth.json'
          else
            printf '%s' '$(AUTH_JSON_SECRET)' > '$(Build.SourcesDirectory)/auth.json'
            echo 'Restored raw auth.json'
          fi
        displayName: 'Restore auth.json from secret'

      - script: |
          PLAYWRIGHT_JUNIT_OUTPUT_NAME="$(JUNIT_PREFIX)-e2e-results.xml" npm run $(E2E_SCRIPT) -- --reporter=line,junit,html
        workingDirectory: '$(TEST_WORKDIR)'
        displayName: 'Run Playwright tests'
        env:
          CI: '1'
          PLAYWRIGHT_HTML_REPORT_OPEN: never
          ADMIN_BASE_URL: '$(ADMIN_BASE_URL)'
          PUPIL_BASE_URL: '$(PUPIL_BASE_URL)'
          PUPIL_API_BASE_URL: '$(PUPIL_API_BASE_URL)'

      - task: PublishTestResults@2
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: '$(TEST_WORKDIR)/test-results/*.xml'
          mergeTestResults: true
          failTaskOnFailedTests: true
          testRunTitle: 'MTC Playwright Tests - Dev'
        displayName: 'Publish Playwright test results'

      - task: PublishBuildArtifacts@1
        condition: always()
        inputs:
          PathtoPublish: '$(Build.SourcesDirectory)/$(TEST_WORKDIR)/test-results'
          ArtifactName: 'MTC-Playwright-Test-Results-Dev'
          publishLocation: 'Container'
        displayName: 'Upload Playwright test results'

      - task: PublishBuildArtifacts@1
        condition: always()
        inputs:
          PathtoPublish: '$(Build.SourcesDirectory)/$(TEST_WORKDIR)/playwright-report'
          ArtifactName: 'MTC-Playwright-HTML-Report-Dev'
          publishLocation: 'Container'
        displayName: 'Upload Playwright HTML report'

