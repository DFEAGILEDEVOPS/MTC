trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  - name: NODE_VERSION
    value: '20'
  - name: TEST_WORKDIR
    value: 'test/pupil-hpa'
  - name: PUPIL_BASE_URL
    value: 'https://testpupil-as-mtc.azurewebsites.net'
  - name: ADMIN_BASE_URL
    value: 'https://testadmin-as-mtc.azurewebsites.net'

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: '$(NODE_VERSION)'
    displayName: 'Install Node.js'

  - task: Cache@2
    inputs:
      key: 'npm | "$(Agent.OS)" | $(TEST_WORKDIR)/package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(HOME)/.npm
    displayName: 'Cache npm dependencies'

  - script: npm ci
    workingDirectory: '$(TEST_WORKDIR)'
    displayName: 'Install test dependencies'

  - script: npx playwright install --with-deps
    workingDirectory: '$(TEST_WORKDIR)'
    displayName: 'Install Playwright browsers'

  - script: npm run test:accessibility
    workingDirectory: '$(TEST_WORKDIR)'
    displayName: 'Run Playwright accessibility tests'
    env:
      PUPIL_BASE_URL: '$(PUPIL_BASE_URL)'
      ADMIN_BASE_URL: '$(ADMIN_BASE_URL)'
      CI: '1'

  - task: PublishBuildArtifacts@1
    condition: always()
    inputs:
      PathtoPublish: '$(Build.SourcesDirectory)/$(TEST_WORKDIR)/test-results'
      ArtifactName: 'playwright-accessibility-test-results'
      publishLocation: 'Container'
    displayName: 'Upload Playwright raw test results'